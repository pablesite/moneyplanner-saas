name: CI - Main

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-main
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  SAAS_BACKEND_IMAGE: ghcr.io/pablesite/moneyplanner-saas-backend
  SAAS_FRONTEND_IMAGE: ghcr.io/pablesite/moneyplanner-saas-frontend
  CORE_BACKEND_IMAGE: ghcr.io/pablesite/moneyplanner-core-backend
  IMAGE_TAG: sha-${{ github.sha }}
  PRODUCTION_URL: ${{ vars.PRODUCTION_URL != '' && vars.PRODUCTION_URL || 'https://moneyplanner.codinglab.es' }}

jobs:
  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deps:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend deps
        run: pip install -r backend/requirements.txt pip-audit

      - name: pip-audit (backend)
        run: pip-audit -r backend/requirements.txt

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: npm audit (production deps)
        run: npm audit --omit=dev --audit-level=high
        working-directory: frontend

  backend-quality:
    name: Backend - lint, types, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: saas
          POSTGRES_USER: saas
          POSTGRES_PASSWORD: saas
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U saas -d saas"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Mypy
        run: mypy .

      - name: Migration consistency check
        run: python manage.py makemigrations --check --dry-run
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: saas
          DB_USER: saas
          DB_PASSWORD: saas
          DJANGO_DEBUG: "1"
          DJANGO_SECRET_KEY: "ci-only-insecure-key-not-used-in-production-xK9mP2nQ8rT5vW3yZ7aB4dF6hJ1lN0oR"
          JWT_SIGNING_KEY: "ci-only-insecure-key-not-used-in-production-xK9mP2nQ8rT5vW3yZ7aB4dF6hJ1lN0oR"

      - name: Tests
        run: |
          coverage run --rcfile=.coveragerc manage.py test saas_access
          coverage report --fail-under=80
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: saas
          DB_USER: saas
          DB_PASSWORD: saas
          DJANGO_DEBUG: "1"
          DJANGO_SECRET_KEY: "ci-only-insecure-key-not-used-in-production-xK9mP2nQ8rT5vW3yZ7aB4dF6hJ1lN0oR"
          JWT_SIGNING_KEY: "ci-only-insecure-key-not-used-in-production-xK9mP2nQ8rT5vW3yZ7aB4dF6hJ1lN0oR"

  frontend-quality:
    name: Frontend - lint, types, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

  docker-build-push:
    name: Build, scan and push - ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [gitleaks, deps, backend-quality, frontend-quality]
    permissions:
      actions: read
      contents: read
      packages: write
      security-events: write
    strategy:
      matrix:
        include:
          - service: saas-backend
            image: ghcr.io/pablesite/moneyplanner-saas-backend
            context: backend
            dockerfile: backend/Dockerfile.prod
          - service: saas-frontend
            image: ghcr.io/pablesite/moneyplanner-saas-frontend
            context: frontend
            dockerfile: frontend/Dockerfile.prod
            build_args: |
              VITE_API_BASE_URL=
              VITE_CORE_API_BASE_URL=
          - service: core-backend
            image: ghcr.io/pablesite/moneyplanner-core-backend
            context: core/backend
            dockerfile: core/backend/Dockerfile.prod
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_PUSH_USERNAME != '' && secrets.GHCR_PUSH_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_PUSH_TOKEN != '' && secrets.GHCR_PUSH_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=${{ env.IMAGE_TAG }}
            type=raw,value=latest

      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true

      - name: Upload Trivy results to GitHub Security
        if: always() && vars.ENABLE_CODE_SCANNING_UPLOAD == '1'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

      - name: Push image
        if: success()
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args || '' }}
          cache-from: type=gha

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: [docker-build-push]
    if: github.ref == 'refs/heads/main' && vars.ENABLE_PRODUCTION_DEPLOY == '1'
    environment:
      name: production
      url: ${{ env.PRODUCTION_URL }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Connect Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:ci

      - name: Configure SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT != '' && vars.DEPLOY_PORT || '2621' }}
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"
          mkdir -p ~/.ssh
          printf '%s' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Upload production compose
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT != '' && vars.DEPLOY_PORT || '2621' }}
        run: |
          scp -P "$DEPLOY_PORT" docker-compose.prod.yml "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/docker-compose.prod.yml"

      - name: Upload release image pins
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT != '' && vars.DEPLOY_PORT || '2621' }}
        run: |
          cat > .env.release <<EOF
          SAAS_BACKEND_IMAGE=${SAAS_BACKEND_IMAGE}:${IMAGE_TAG}
          SAAS_FRONTEND_IMAGE=${SAAS_FRONTEND_IMAGE}:${IMAGE_TAG}
          CORE_BACKEND_IMAGE=${CORE_BACKEND_IMAGE}:${IMAGE_TAG}
          EOF
          scp -P "$DEPLOY_PORT" .env.release "${DEPLOY_USER}@${DEPLOY_HOST}:${DEPLOY_PATH}/.env.release"

      - name: Deploy stack
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT != '' && vars.DEPLOY_PORT || '2621' }}
          DEPLOY_ENV_FILE: ${{ vars.DEPLOY_ENV_FILE != '' && vars.DEPLOY_ENV_FILE || '.env' }}
          GHCR_PULL_USERNAME: ${{ secrets.GHCR_PUSH_USERNAME != '' && secrets.GHCR_PUSH_USERNAME || github.actor }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PUSH_TOKEN != '' && secrets.GHCR_PUSH_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          # shellcheck disable=SC2029
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" "
            set -euo pipefail
            cd '${DEPLOY_PATH}'
            echo '${GHCR_PULL_TOKEN}' | docker login ghcr.io -u '${GHCR_PULL_USERNAME}' --password-stdin
            docker compose -f docker-compose.prod.yml --env-file '${DEPLOY_ENV_FILE}' --env-file .env.release pull
            docker compose -f docker-compose.prod.yml --env-file '${DEPLOY_ENV_FILE}' --env-file .env.release up -d --wait --wait-timeout 300 --remove-orphans
            docker compose -f docker-compose.prod.yml --env-file '${DEPLOY_ENV_FILE}' --env-file .env.release ps
          "

  smoke-production:
    name: Smoke production
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.ref == 'refs/heads/main' && vars.ENABLE_PRODUCTION_DEPLOY == '1'
    steps:
      - name: Smoke checks
        env:
          PRODUCTION_URL: ${{ env.PRODUCTION_URL }}
        run: |
          curl --fail --silent --show-error --location \
            --retry 6 --retry-delay 10 --retry-all-errors \
            "${PRODUCTION_URL}/api/auth/mode/" > /dev/null
