name: Quality SaaS

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy
        run: mypy .

      - name: Django tests (memberships)
        run: python manage.py test memberships
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: saas
          DB_USER: saas
          DB_PASSWORD: saas
    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: saas
          POSTGRES_USER: saas
          POSTGRES_PASSWORD: saas
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U saas -d saas"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier check
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit
