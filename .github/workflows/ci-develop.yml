name: CI — Develop

on:
  push:
    branches: [develop]

jobs:
  quality:
    name: Backend — lint, types, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      db:
        image: postgres:15
        env:
          POSTGRES_DB: saas
          POSTGRES_USER: saas
          POSTGRES_PASSWORD: saas
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U saas -d saas"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format
        run: ruff format --check .

      - name: Mypy
        run: mypy .

      - name: Tests
        run: |
          coverage run --rcfile=.coveragerc manage.py test saas_access memberships
          coverage report --fail-under=80
        env:
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: saas
          DB_USER: saas
          DB_PASSWORD: saas

  frontend-quality:
    name: Frontend — lint, types, tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:coverage

  docker-build-scan:
    name: Docker build + Trivy scan
    runs-on: ubuntu-latest
    needs: [quality, frontend-quality]
    permissions:
      contents: read
      security-events: write
    strategy:
      matrix:
        include:
          - service: saas-backend
            context: backend
            dockerfile: backend/Dockerfile
          - service: saas-frontend
            context: frontend
            dockerfile: frontend/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: moneyplanner/${{ matrix.service }}:develop
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: moneyplanner/${{ matrix.service }}:develop
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}
