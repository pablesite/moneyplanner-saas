name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Auto-merge release PR
        if: ${{ steps.release.outputs.pr }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PLEASE_TOKEN }}
        run: |
          release_pr_number="$(gh pr list --repo "${GITHUB_REPOSITORY}" --state open --label 'autorelease: pending' --json number --jq '.[0].number')"
          test -n "$release_pr_number"
          gh pr merge --repo "${GITHUB_REPOSITORY}" --squash --auto "$release_pr_number"
