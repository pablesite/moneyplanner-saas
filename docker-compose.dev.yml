name: moneyplanner-dev

services:
  core_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${CORE_POSTGRES_DB:-core}
      POSTGRES_USER: ${CORE_POSTGRES_USER:-core}
      POSTGRES_PASSWORD: ${CORE_POSTGRES_PASSWORD:-core}
    ports:
      - "5432:5432"
    volumes:
      - core_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${CORE_POSTGRES_USER:-core} -d ${CORE_POSTGRES_DB:-core}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - moneyplanner-dev

  core_backend:
    build:
      context: ./core/backend
      dockerfile: Dockerfile
    environment:
      DJANGO_SECRET_KEY: ${CORE_DJANGO_SECRET_KEY:-dev-only-not-for-production-change-me-please-32b}
      DJANGO_DEBUG: ${CORE_DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${CORE_DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,core_backend}
      CORS_ALLOWED_ORIGINS: ${CORE_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-dev-only-not-for-production-change-me-please-32b}
      DB_NAME: ${CORE_POSTGRES_DB:-core}
      DB_USER: ${CORE_POSTGRES_USER:-core}
      DB_PASSWORD: ${CORE_POSTGRES_PASSWORD:-core}
      DB_HOST: core_db
      DB_PORT: "5432"
      SEED_CREATE_ADMIN: ${CORE_SEED_CREATE_ADMIN:-1}
      SEED_ADMIN_USERNAME: ${CORE_SEED_ADMIN_USERNAME:-admin}
      SEED_ADMIN_EMAIL: ${CORE_SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${CORE_SEED_ADMIN_PASSWORD:-admin}
      SEED_FORCE_ADMIN_PASSWORD: ${CORE_SEED_FORCE_ADMIN_PASSWORD:-0}
      SEED_CREATE_DEMO: ${CORE_SEED_CREATE_DEMO:-1}
      FX_PIVOT: ${FX_PIVOT:-USD}
      FX_SYNC_ENABLED: ${FX_SYNC_ENABLED:-1}
      FX_SYNC_QUOTE_CURRENCY: ${FX_SYNC_QUOTE_CURRENCY:-EUR}
      FX_SYNC_INTERVAL_SECONDS: ${FX_SYNC_INTERVAL_SECONDS:-86400}
      AUTH_ACCEPT_EXTERNAL_TOKENS: ${AUTH_ACCEPT_EXTERNAL_TOKENS:-1}
      EXTERNAL_JWT_ISSUER: ${EXTERNAL_JWT_ISSUER:-moneyplanner-saas}
      EXTERNAL_JWT_AUDIENCE: ${EXTERNAL_JWT_AUDIENCE:-moneyplanner-saas-api}
      EXTERNAL_JWT_SIGNING_KEY: ${EXTERNAL_JWT_SIGNING_KEY:-dev-only-not-for-production-change-me-please-32b}
      CORE_LINKING_SHARED_SECRET: ${CORE_LINKING_SHARED_SECRET:-dev-only-shared-linking-secret-32b-minimum}
      CORE_LINKING_TOKEN_MAX_AGE_SECONDS: ${CORE_LINKING_TOKEN_MAX_AGE_SECONDS:-300}
      PIONEX_API_KEY: ${PIONEX_API_KEY:-}
      PIONEX_API_SECRET: ${PIONEX_API_SECRET:-}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
      BROKER_ENCRYPTION_KEY: ${BROKER_ENCRYPTION_KEY:-}
    volumes:
      - ./core/backend:/app
    ports:
      - "8000:8000"
    depends_on:
      core_db:
        condition: service_healthy
    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py seed &&
      python manage.py seed_demo &&
      python manage.py runserver 0.0.0.0:8000
      "
    networks:
      - moneyplanner-dev

  core_market_data_sync:
    build:
      context: ./core/backend
      dockerfile: Dockerfile
    environment:
      DJANGO_SECRET_KEY: ${CORE_DJANGO_SECRET_KEY:-dev-only-not-for-production-change-me-please-32b}
      DJANGO_DEBUG: ${CORE_DJANGO_DEBUG:-1}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-dev-only-not-for-production-change-me-please-32b}
      DB_NAME: ${CORE_POSTGRES_DB:-core}
      DB_USER: ${CORE_POSTGRES_USER:-core}
      DB_PASSWORD: ${CORE_POSTGRES_PASSWORD:-core}
      DB_HOST: core_db
      DB_PORT: "5432"
      FX_PIVOT: ${FX_PIVOT:-USD}
      FX_SYNC_ENABLED: ${FX_SYNC_ENABLED:-1}
      FX_SYNC_QUOTE_CURRENCY: ${FX_SYNC_QUOTE_CURRENCY:-EUR}
      FX_SYNC_INTERVAL_SECONDS: ${FX_SYNC_INTERVAL_SECONDS:-86400}
    volumes:
      - ./core/backend:/app
    depends_on:
      core_db:
        condition: service_healthy
    restart: unless-stopped
    command: >
      sh -c "
      python manage.py migrate &&
      while true; do
        if [ \"$${FX_SYNC_ENABLED:-1}\" = \"1\" ]; then
          python manage.py sync_market_data --datasets fx inflation --mode reconcile || true;
        fi;
        sleep $${FX_SYNC_INTERVAL_SECONDS:-86400};
      done
      "
    networks:
      - moneyplanner-dev

  core_frontend:
    build:
      context: ./core/frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: ${CORE_FRONTEND_VITE_API_BASE_URL:-http://127.0.0.1:8000}
      VITE_CORE_API_BASE_URL: ${CORE_FRONTEND_VITE_CORE_API_BASE_URL:-http://127.0.0.1:8000}
      CHOKIDAR_USEPOLLING: "${FRONTEND_USE_POLLING:-false}"
      WATCHPACK_POLLING: "${FRONTEND_USE_POLLING:-false}"
      CHOKIDAR_INTERVAL: "${FRONTEND_POLLING_INTERVAL:-300}"
    volumes:
      - ./core/frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - core_backend
    networks:
      - moneyplanner-dev

  saas_db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${SAAS_POSTGRES_DB:-saas}
      POSTGRES_USER: ${SAAS_POSTGRES_USER:-saas}
      POSTGRES_PASSWORD: ${SAAS_POSTGRES_PASSWORD:-saas}
    ports:
      - "5433:5432"
    volumes:
      - saas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${SAAS_POSTGRES_USER:-saas} -d ${SAAS_POSTGRES_DB:-saas}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - moneyplanner-dev

  saas_backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DJANGO_SECRET_KEY: ${SAAS_DJANGO_SECRET_KEY:-dev-only-not-for-production-change-me-please-32b}
      DJANGO_DEBUG: ${SAAS_DJANGO_DEBUG:-1}
      DJANGO_ALLOWED_HOSTS: ${SAAS_DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1,saas_backend}
      CORS_ALLOWED_ORIGINS: ${SAAS_CORS_ALLOWED_ORIGINS:-http://localhost:5174,http://127.0.0.1:5174}
      CORS_ALLOW_CREDENTIALS: ${SAAS_CORS_ALLOW_CREDENTIALS:-0}
      CORS_ALLOW_ALL_ORIGINS: ${SAAS_CORS_ALLOW_ALL_ORIGINS:-0}
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-dev-only-not-for-production-change-me-please-32b}
      JWT_ISSUER: ${JWT_ISSUER:-moneyplanner-saas}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-moneyplanner-saas-api}
      DB_NAME: ${SAAS_POSTGRES_DB:-saas}
      DB_USER: ${SAAS_POSTGRES_USER:-saas}
      DB_PASSWORD: ${SAAS_POSTGRES_PASSWORD:-saas}
      DB_HOST: saas_db
      DB_PORT: "5432"
      CORE_API_BASE_URL: ${CORE_API_BASE_URL:-http://core_backend:8000}
      CORE_API_HOST_HEADER: ${CORE_API_HOST_HEADER:-localhost}
      CORE_API_X_FORWARDED_PROTO: ${CORE_API_X_FORWARDED_PROTO:-}
      CORE_BOOTSTRAP_TIMEOUT_SECONDS: ${CORE_BOOTSTRAP_TIMEOUT_SECONDS:-5}
      SAAS_PUBLIC_REGISTRATION_ENABLED: ${SAAS_PUBLIC_REGISTRATION_ENABLED:-1}
      ACCOUNT_LINKING_ENABLED: ${ACCOUNT_LINKING_ENABLED:-1}
      CORE_LINKING_SHARED_SECRET: ${CORE_LINKING_SHARED_SECRET:-dev-only-shared-linking-secret-32b-minimum}
      CORE_LINKING_TOKEN_MAX_AGE_SECONDS: ${CORE_LINKING_TOKEN_MAX_AGE_SECONDS:-300}
      SEED_CREATE_ADMIN: ${SAAS_SEED_CREATE_ADMIN:-1}
      SEED_ADMIN_USERNAME: ${SAAS_SEED_ADMIN_USERNAME:-admin}
      SEED_ADMIN_EMAIL: ${SAAS_SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SAAS_SEED_ADMIN_PASSWORD:-admin}
      SEED_FORCE_ADMIN_PASSWORD: ${SAAS_SEED_FORCE_ADMIN_PASSWORD:-0}
    volumes:
      - ./backend:/app
    ports:
      - "8001:8000"
    depends_on:
      saas_db:
        condition: service_healthy
      core_backend:
        condition: service_started
    command: >
      sh -c "python manage.py migrate --fake-initial &&
             python manage.py seed &&
             python manage.py runserver 0.0.0.0:8000"
    networks:
      - moneyplanner-dev

  saas_frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      VITE_API_BASE_URL: ${SAAS_FRONTEND_VITE_API_BASE_URL:-http://127.0.0.1:8001}
      VITE_CORE_API_BASE_URL: ${SAAS_FRONTEND_VITE_CORE_API_BASE_URL:-http://127.0.0.1:8000}
      CHOKIDAR_USEPOLLING: "${FRONTEND_USE_POLLING:-false}"
      WATCHPACK_POLLING: "${FRONTEND_USE_POLLING:-false}"
      CHOKIDAR_INTERVAL: "${FRONTEND_POLLING_INTERVAL:-300}"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5174:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    depends_on:
      - saas_backend
      - core_backend
    networks:
      - moneyplanner-dev

volumes:
  core_postgres_data:
    external: true
    name: moneyplanner-core_core_postgres_data
  saas_postgres_data:
    external: true
    name: moneyplanner-saas_saas_postgres_data

networks:
  moneyplanner-dev:
    name: moneyplanner-dev
