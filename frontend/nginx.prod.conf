server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # El service worker y el manifest NO se cachean: un sw.js cacheado dejaria a
    # los usuarios clavados en una version antigua sin recibir actualizaciones.
    # (add_header en location reemplaza las del server, por eso se reañade nosniff.)
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
