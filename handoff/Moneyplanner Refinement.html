<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Moneyplanner — refinement</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300..800&family=Geist+Mono:wght@400..600&family=Newsreader:opsz,wght@6..72,300..700&display=swap" rel="stylesheet">

<style>
  :root {
    --accent-h: 178;        /* tweakable */
    --accent: oklch(0.72 0.10 var(--accent-h));
    --accent-soft: oklch(0.72 0.10 var(--accent-h) / 0.14);
    --accent-line: oklch(0.72 0.10 var(--accent-h) / 0.42);
    --density: 1;           /* 0.8 compact, 1 cozy */
    color-scheme: dark;
    font-family: "Geist", "Segoe UI", system-ui, sans-serif;
  }
  html, body { margin:0; padding:0; background:#f0eee9; }
  body { font-family: "Geist", "Segoe UI", system-ui, sans-serif; }

  /* note style */
  .note {
    font-family: "Geist", system-ui, sans-serif;
    font-size: 13px;
    line-height: 1.5;
    color: #3a322a;
    padding: 14px 18px;
    background: #fffbe8;
    border: 1px solid rgba(0,0,0,0.08);
    border-radius: 10px;
    max-width: 520px;
  }
  .note h4 { margin: 0 0 4px; font-size: 12px; text-transform: uppercase; letter-spacing: 0.08em; color: #8a6c2e; font-weight: 700;}
  .note p  { margin: 6px 0 0; }
  .note ul { margin: 6px 0 0; padding-left: 16px; }
  .note li { margin: 2px 0; }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel" src="direction-a.jsx"></script>
<script type="text/babel" src="direction-a-more.jsx"></script>
<script type="text/babel" src="direction-b.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
